version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: loan-ews-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: loan_ews

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loan-ews-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/loan_ews
      - JWT_SECRET=loan_ews_super_secret_key_2024
      - JWT_EXPIRES_IN=24h
      - LLM_WRAPPER_URL=https://llm-wrapper-741152993481.asia-south1.run.app
      - LLM_API_TOKEN=${LLM_API_TOKEN}
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loan-ews-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
